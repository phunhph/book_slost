name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-unit-tests:
    name: Backend unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile and run unit tests
        env:
          APP_ENV: test
          JWT_SECRET_KEY: ci-unit-test-secret-key-must-be-long-enough
        run: |
          python -m compileall app
          pytest -q --tb=short

  admin_frontend:
    name: Admin frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin_frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: admin_frontend/package-lock.json

      - name: Install and build admin frontend
        run: |
          npm ci
          npm run build

  kol_frontend:
    name: KOL frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kol_frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: kol_frontend/package-lock.json

      - name: Install and build KOL frontend
        run: |
          npm ci
          npm run build

  client_frontend:
    name: Client frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client_frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: client_frontend/package-lock.json

      - name: Install and build client frontend
        run: |
          npm ci
          npm run build

  # Required check: only green when backend unit tests + frontend builds pass.
  ci-success:
    name: CI success
    runs-on: ubuntu-latest
    needs:
      - backend-unit-tests
      - admin_frontend
      - kol_frontend
      - client_frontend
    steps:
      - name: All required checks passed
        run: echo "Unit tests and builds passed. Deploy is allowed."
