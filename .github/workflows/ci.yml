name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backend tests
        run: |
          python -m compileall app
          pytest

  admin_frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin_frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: admin_frontend/package-lock.json

      - name: Install and build admin frontend
        run: |
          npm ci
          npm run build

  kol_frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kol_frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: kol_frontend/package-lock.json

      - name: Install and build KOL frontend
        run: |
          npm ci
          npm run build

  client_frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client_frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: client_frontend/package-lock.json

      - name: Install and build client frontend
        run: |
          npm ci
          npm run build
