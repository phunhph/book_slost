name: Docker Build / Deploy

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main
      - master

concurrency:
  group: deploy-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: true

jobs:
  docker-images:
    name: Build deploy images
    runs-on: ubuntu-latest
    # Manual dispatch always allowed; push/PR path only when CI finished green.
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    steps:
      - name: Checkout CI commit
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Confirm unit-test gate
        run: |
          echo "Deploy/build allowed."
          echo "Trigger: ${{ github.event_name }}"
          echo "CI conclusion: ${{ github.event.workflow_run.conclusion || 'n/a (manual)' }}"
          echo "Commit: ${{ github.event.workflow_run.head_sha || github.sha }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: local/book-slost-backend:latest

      - name: Build admin image
        uses: docker/build-push-action@v6
        with:
          context: ./admin_frontend
          file: ./admin_frontend/Dockerfile
          push: false
          tags: local/book-slost-admin:latest

      - name: Build KOL image
        uses: docker/build-push-action@v6
        with:
          context: ./kol_frontend
          file: ./kol_frontend/Dockerfile
          push: false
          tags: local/book-slost-kol:latest

      - name: Build client image
        uses: docker/build-push-action@v6
        with:
          context: ./client_frontend
          file: ./client_frontend/Dockerfile
          push: false
          tags: local/book-slost-client:latest
