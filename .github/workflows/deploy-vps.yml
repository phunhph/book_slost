name: Deploy VPS (manual)

on:
  workflow_dispatch:

concurrency:
  group: deploy-vps-manual
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
      VPS_APP_PATH: ${{ secrets.VPS_APP_PATH }}
    steps:
      - name: Verify GitHub Secrets
        run: |
          missing=0
          for name in VPS_HOST VPS_USER VPS_SSH_KEY VPS_APP_PATH; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing repository secret: $name"
              missing=1
            fi
          done
          [ "$missing" -eq 0 ] || exit 1

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          key: ${{ env.VPS_SSH_KEY }}
          port: 22
          command_timeout: 30m
          script_stop: true
          script: |
            set -e
            export APP_ROOT="${{ env.VPS_APP_PATH }}"
            cd "$APP_ROOT"
            echo "Manual deploy — sync origin/main"
            ./scripts/deploy.sh
